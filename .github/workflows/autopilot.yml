# Autonomous development cycle in CI — one full AUTOPILOT cycle per run.
#
# Trigger manually (workflow_dispatch) or uncomment the cron for nightly
# self-evolution. Requires repo secret ANTHROPIC_API_KEY.
name: autopilot

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 2 * * *'   # nightly at 02:00 UTC — uncomment to go fully unattended

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run one autonomous cycle
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: 'Start'
          claude_args: '--max-turns 200'
