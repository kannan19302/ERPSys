name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: unierp
          POSTGRES_PASSWORD: unierp
          POSTGRES_DB: unierp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://unierp:unierp@localhost:5432/unierp_test
      DATABASE_OWNER_URL: postgresql://unierp:unierp@localhost:5432/unierp_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate --name ci_init
      - run: pnpm -r test

  coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: unierp
          POSTGRES_PASSWORD: unierp
          POSTGRES_DB: unierp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://unierp:unierp@localhost:5432/unierp_test
      DATABASE_OWNER_URL: postgresql://unierp:unierp@localhost:5432/unierp_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate --name ci_init
      - run: pnpm test:coverage
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/coverage/
          retention-days: 14

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm architecture:check
      - run: pnpm migration:discipline
      - run: pnpm foundation:check
      - run: pnpm schema:lint
      - run: pnpm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: unierp
          POSTGRES_PASSWORD: unierp
          POSTGRES_DB: unierp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm db:generate
      - name: Run database migrations
        run: pnpm db:migrate --name e2e_init
        env:
          DATABASE_URL: postgresql://unierp:unierp@localhost:5432/unierp_test
      - name: Seed database
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://unierp:unierp@localhost:5432/unierp_test
      - name: Build API
        run: pnpm --filter @unerp/api build
      - name: Build web
        run: pnpm --filter @unerp/web build
      - name: Install Playwright browsers
        run: pnpm --filter @unerp/web exec playwright install --with-deps chromium
      - name: Run E2E tests (all projects)
        run: pnpm --filter @unerp/web test:e2e:all
        env:
          DATABASE_URL: postgresql://unierp:unierp@localhost:5432/unierp_test
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          E2E_EMAIL: admin@unerp.dev
          E2E_PASSWORD: admin123
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
