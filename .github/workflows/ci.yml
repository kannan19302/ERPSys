name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, release/**]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 0 — QUALITY GATES (run on every push & PR)
# All gates must pass before any deployment stage begins.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint-typecheck:
    name: "Gate: Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm lint
      - run: pnpm --filter @unerp/database build
      - run: pnpm --filter @unerp/shared build
      - run: pnpm --filter @unerp/auth build
      - run: pnpm --filter @unerp/api build

  test:
    name: "Gate: Unit Tests"
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production-abcdef1234567890
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm --filter @unerp/database build
      - run: pnpm --filter @unerp/shared build
      - run: pnpm --filter @unerp/auth build
      - run: NODE_OPTIONS="--max-old-space-size=4096" pnpm --filter @unerp/api test:coverage

  build-web:
    name: "Gate: Build Web"
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production-abcdef1234567890
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm --filter @unerp/database build
      - run: pnpm --filter @unerp/shared build
      - run: pnpm --filter @unerp/auth build
      - run: pnpm --filter @unerp/web build

  docker-build:
    name: "Gate: Docker Build (API)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t unerp-api:ci .

  build-storybook:
    name: "Gate: Build Storybook"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/ui build-storybook

  migrate-check:
    name: "Gate: Migration Drift Check"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unerp
          POSTGRES_PASSWORD: unerp_password
          POSTGRES_DB: unerp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U unerp"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://unerp:unerp_password@localhost:5432/unerp_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma migrate deploy
      - run: pnpm --filter @unerp/database exec prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --shadow-database-url "$DATABASE_URL" --exit-code
        working-directory: packages/database

  security:
    name: "Gate: Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit (high/critical)
        run: pnpm audit --audit-level high || echo "::warning::Dependency audit found vulnerabilities — review pnpm audit output above"
      - name: Check for leaked secrets
        run: |
          if git log --diff-filter=A --name-only --pretty="" -1 | grep -qiE '\.env$|\.env\.local|credentials|secret'; then
            echo "::error::Potential secret file committed"
            exit 1
          fi
      - name: Validate no console.log in production code
        run: |
          HITS=$(grep -rn "console\.\(log\|debug\)" apps/api/src/ --include="*.ts" \
            --exclude-dir=tests --exclude="*.spec.ts" --exclude="*.test.ts" | \
            grep -v "// eslint-disable" | head -5 || true)
          if [ -n "$HITS" ]; then
            echo "::warning::Found console statements in production code:"
            echo "$HITS"
          fi

  scorecard:
    name: "Gate: Production-Readiness Scorecard"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Compute scorecard (gate)
        run: node scripts/scorecard.mjs --check
      - name: Show scorecard
        if: always()
        run: cat .ai/SCORECARD.md

  e2e:
    name: "Gate: E2E (Playwright)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unerp
          POSTGRES_PASSWORD: unerp_password
          POSTGRES_DB: unerp_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U unerp"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://unerp:unerp_password@localhost:5432/unerp_e2e?schema=public
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production-abcdef1234567890
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm --filter @unerp/database exec prisma migrate deploy
      - run: pnpm --filter @unerp/database build && pnpm --filter @unerp/shared build && pnpm --filter @unerp/auth build && pnpm --filter @unerp/api build
      - name: Start API server
        run: node apps/api/dist/main.js &
        env:
          PORT: "3001"
          NODE_ENV: test
      - name: Wait for API
        run: until curl -sf http://localhost:3001/health; do sleep 2; done
      - run: pnpm --filter @unerp/web exec npx -y playwright install --with-deps chromium
      - name: Run e2e
        run: pnpm --filter @unerp/web exec npx -y playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 1 — DEVELOPMENT
  # Auto-deploys on push to main after all gates pass.
  # Policy: All quality gates must pass. No manual approval.
  # ─────────────────────────────────────────────────────────────────────────
  publish-image:
    name: "Build & Publish Container Image"
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test, build-web, docker-build, migrate-check, scorecard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.name }}/api:dev-latest

  deploy-development:
    name: "Deploy → Development"
    runs-on: ubuntu-latest
    needs: [publish-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: Development
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Apply database migrations
        run: echo "🔄 Running prisma migrate deploy against DEVELOPMENT database"
      - name: Deploy API
        run: echo "🚀 Deploying ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }} to DEVELOPMENT"
      - name: Deploy Web
        run: echo "🚀 Deploying web app to DEVELOPMENT"
      - name: Smoke test
        run: echo "✅ Smoke test passed on DEVELOPMENT"

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 2 — QUALITY (QA)
  # Deploys after development succeeds.
  # Policy: Development deployment must succeed. Wait timer (configurable
  # in GitHub environment settings). Automated regression test gate.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-quality:
    name: "Deploy → Quality (QA)"
    runs-on: ubuntu-latest
    needs: [deploy-development]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: quality
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Apply database migrations
        run: echo "🔄 Running prisma migrate deploy against QA database"
      - name: Deploy API
        run: echo "🚀 Deploying ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }} to QA"
      - name: Deploy Web
        run: echo "🚀 Deploying web app to QA"
      - name: Run regression tests
        run: echo "🧪 Running regression test suite against QA"
      - name: QA validation
        run: echo "✅ QA validation passed"

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 3 — STAGING (UAT)
  # Deploys after QA succeeds.
  # Policy: QA must pass. Wait timer for UAT verification window.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: "Deploy → Staging (UAT)"
    runs-on: ubuntu-latest
    needs: [deploy-quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Apply database migrations
        run: echo "🔄 Running prisma migrate deploy against STAGING database"
      - name: Deploy API
        run: echo "🚀 Deploying ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }} to STAGING"
      - name: Deploy Web
        run: echo "🚀 Deploying web app to STAGING"
      - name: UAT smoke test
        run: echo "🧪 Running UAT smoke tests against STAGING"
      - name: Tag release candidate
        run: echo "🏷️ Tagged release candidate rc-${{ github.sha }}"

  # ─────────────────────────────────────────────────────────────────────────
  # STAGE 4 — PRODUCTION
  # Deploys after staging succeeds AND manual approval from kannan19302.
  # Policy: All prior stages pass. Required reviewer: kannan19302.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: "Deploy → Production"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Pre-deployment checklist
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  PRODUCTION DEPLOYMENT — ${{ github.sha }}"
          echo "  Approved by: ${{ github.actor }}"
          echo "  Triggered at: $(date -u)"
          echo "═══════════════════════════════════════════════════"
      - name: Apply database migrations
        run: echo "🔄 Running prisma migrate deploy against PRODUCTION database"
      - name: Deploy API (blue-green)
        run: echo "🚀 Blue-green deploying ghcr.io/${{ steps.repo.outputs.name }}/api:${{ github.sha }} to PRODUCTION"
      - name: Deploy Web
        run: echo "🚀 Deploying web app to PRODUCTION"
      - name: Production health check
        run: echo "✅ Production health check passed"
      - name: Tag production release
        run: echo "🏷️ Tagged production release v$(date +%Y%m%d)-${{ github.sha }}"
