name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm lint
      - run: pnpm --filter @unerp/database build
      - run: pnpm --filter @unerp/shared build
      - run: pnpm --filter @unerp/auth build
      - run: pnpm --filter @unerp/api build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production-abcdef1234567890
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm --filter @unerp/database build
      - run: pnpm --filter @unerp/shared build
      - run: pnpm --filter @unerp/auth build
      - run: pnpm --filter @unerp/api test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage
          if-no-files-found: ignore

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Non-blocking until flows are stabilised (Phase 3 flips to required).
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unerp
          POSTGRES_PASSWORD: unerp_password
          POSTGRES_DB: unerp_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U unerp"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://unerp:unerp_password@localhost:5432/unerp_e2e?schema=public
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production-abcdef1234567890
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm --filter @unerp/database exec prisma migrate deploy
      - run: pnpm --filter @unerp/database build && pnpm --filter @unerp/shared build && pnpm --filter @unerp/auth build && pnpm --filter @unerp/api build
      - run: pnpm --filter @unerp/web exec playwright install --with-deps chromium
      - name: Run e2e
        run: pnpm --filter @unerp/web test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level high
        continue-on-error: true
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3

  docker-build:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t unerp-api:ci .

  publish:
    name: Publish image (GHCR)
    runs-on: ubuntu-latest
    needs: [docker-build, test, lint-typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}

  deploy-staging:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # GitHub environment carries the deploy secrets + protection rules.
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Apply database migrations
        run: echo "prisma migrate deploy against staging — run via environment secrets (DATABASE_URL)"
      - name: Roll out image
        run: echo "Pull ghcr.io/${{ github.repository }}/api:${{ github.sha }} and restart the staging service"

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production-abcdef1234567890
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm --filter @unerp/database build
      - run: pnpm --filter @unerp/shared build
      - run: pnpm --filter @unerp/auth build
      - run: pnpm --filter @unerp/web build

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/ui build-storybook

  scorecard:
    name: Production-Readiness Scorecard
    runs-on: ubuntu-latest
    # Non-blocking until every dimension reaches 10 (Phase 3 flips this to required).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Compute scorecard (gate)
        run: node scripts/scorecard.mjs --check
      - name: Show scorecard
        if: always()
        run: cat .ai/SCORECARD.md

  migrate-check:
    name: Migration Drift Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: unerp
          POSTGRES_PASSWORD: unerp_password
          POSTGRES_DB: unerp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U unerp"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://unerp:unerp_password@localhost:5432/unerp_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @unerp/database exec prisma migrate deploy
      - run: pnpm --filter @unerp/database exec prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --exit-code
        working-directory: packages/database
