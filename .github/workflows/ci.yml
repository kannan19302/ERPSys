# Minimal CI — one job, the gates that actually catch regressions.
#
# NOTE: while this repo is PRIVATE, GitHub Actions minutes are billed. Runs fail
# instantly with "job was not started" until Settings → Billing is fixed or the
# repo is made public. The pipeline itself is intentionally cheap (~5-6 min).
#
# Heavier gates (E2E smoke, Storybook, Docker image) run locally per
# .ai/AUTOPILOT.md § Gate tiers; they return to CI post-v1.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production-abcdef1234567890
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm migration:discipline
      - run: pnpm foundation:check
      - run: pnpm --filter @unerp/database exec prisma generate
      - run: pnpm --filter @unerp/database build
      - run: pnpm --filter @unerp/shared build
      - run: pnpm --filter @unerp/auth build
      - run: pnpm --filter @unerp/service-kit build
      - run: pnpm --filter @unerp/api build
      # next build ignores type errors, so tsc --noEmit is the real web gate.
      # Track G.6: .env.example is generated from the env schema — fail on drift.
      - run: node scripts/generate-env-example.mjs --check
      # Track G.8: no Float in schema.prisma outside the shrinking baseline.
      - run: node scripts/check-schema-lints.mjs
      # Track H.1: every PII-carrying model must declare its erasure treatment.
      - run: node scripts/check-pii-registry.mjs
      - run: pnpm --filter @unerp/api typecheck
      - run: pnpm --filter @unerp/web typecheck
      # Track I.1 (foundation roadmap § 11d): the production web artifact must
      # build on every merge. Build workspace UI dists first — the production
      # exports condition resolves them from dist/, not src/.
      - run: pnpm --filter "@unerp/ui*" build
      - run: pnpm --filter @unerp/framework build
      - run: NODE_OPTIONS="--max-old-space-size=6144" pnpm --filter @unerp/web build
      - run: NODE_OPTIONS="--max-old-space-size=4096" pnpm --filter @unerp/api test

  # Track C (#21) — Two-tenant RLS proof (foundation roadmap § 8).
  # Runs with a live PostgreSQL database using the NON-bypass app role.
  rls-integration:
    name: RLS Tenant Isolation Proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: unerp_dev
          POSTGRES_USER: unerp
          POSTGRES_PASSWORD: unerp_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U unerp -d unerp_dev
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_OWNER_URL: postgresql://unerp:unerp_password@localhost:5432/unerp_dev?schema=public
      DATABASE_URL: postgresql://unerp:unerp_password@localhost:5432/unerp_dev?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Create the app role and grant permissions (owner connection)
      - run: pnpm --filter @unerp/database exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_OWNER_URL }}
      - run: pnpm --filter @unerp/database build
      # Run the RLS integration tests as the NON-bypass role
      - run: pnpm --filter @unerp/database exec vitest run tenant-rls-integration.test.ts --reporter verbose
        env:
          DATABASE_URL: postgresql://unerp_api:unerp_api_password@localhost:5432/unerp_dev?schema=public
