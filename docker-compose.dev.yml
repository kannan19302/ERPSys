services:
  postgres:
    image: postgres:16-alpine
    container_name: unerp-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: unerp_dev
      POSTGRES_USER: unerp
      POSTGRES_PASSWORD: unerp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unerp -d unerp_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: unerp-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: unerp-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"     # API
      - "9001:9001"     # Console UI
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:22-alpine
    container_name: unerp-api-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://unerp:unerp_password@postgres:5432/unerp_dev?schema=public
      - REDIS_URL=redis://redis:6379
      - API_PORT=3001
      - API_URL=http://api:3001
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-super-secret-key-change-in-production
      - PII_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=unerp-uploads
      - LOG_LEVEL=debug
      - WATCHPACK_POLLING=true
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/auth/node_modules
      - /app/packages/config/node_modules
      - /app/packages/database/node_modules
      - /app/packages/framework/node_modules
      - /app/packages/shared/node_modules
      - /app/packages/ui/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --no-frozen-lockfile && pnpm db:push && pnpm db:seed && pnpm dev:api"

  web:
    image: node:22-alpine
    container_name: unerp-web-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-super-secret-key-change-in-production
      - API_URL=http://api:3001
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
      - /app/packages/auth/node_modules
      - /app/packages/config/node_modules
      - /app/packages/database/node_modules
      - /app/packages/framework/node_modules
      - /app/packages/shared/node_modules
      - /app/packages/ui/node_modules
    depends_on:
      api:
        condition: service_started
    command: >
      sh -c "corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --no-frozen-lockfile && pnpm dev:web"

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev:
